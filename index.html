<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CzatSZKOLA - MODERATOR PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { overflow: hidden; height: 100dvh; margin: 0; background-color: #0f172a; font-family: 'Inter', sans-serif; color: white; background-size: cover; background-position: center; }
        
        .tab-content { display: none; height: calc(100dvh - 80px); width: 100%; overflow-y: auto; flex-direction: column; }
        .tab-content.active { display: flex; }
        
        #messages { flex: 1; padding: 15px; padding-bottom: 120px; display: flex; flex-direction: column; gap: 15px; }
        .msg-bubble { background: rgba(30, 41, 59, 0.9); padding: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .me .msg-bubble { background: rgba(37, 99, 235, 0.2); border-color: rgba(37, 99, 235, 0.4); }
        .vip-bubble { border: 1px solid #eab308 !important; box-shadow: 0 0 10px rgba(234,179,8,0.2); }

        /* NOWY PANEL ADMINA */
        #adminMenu { display: none; position: fixed; top: 75px; right: 10px; width: 240px; background: #1e293b; border: 2px solid #ef4444; border-radius: 20px; padding: 15px; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .adm-input { w-full bg-black/40 p-2 rounded text-[11px] mb-2 border border-gray-700 outline-none text-white; }
        
        #rickrollOverlay { display: none; position: fixed; inset: 0; z-index: 9999; background: black; }
        #rickrollOverlay iframe { width: 100%; height: 100%; border: none; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; display: flex; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.1); z-index: 500; }
        nav button { flex: 1; font-size: 24px; color: #64748b; }
        nav button.active-nav { color: #3b82f6; border-top: 3px solid #3b82f6; }
    </style>
</head>
<body id="mainBody">

    <!-- PANEL ADMINA -->
    <div id="adminMenu">
        <h3 class="text-red-500 font-bold text-[10px] mb-3 uppercase tracking-tighter">Panel Zarządzania Szefa</h3>
        
        <label class="text-[9px] text-gray-400 ml-1">Kogo ukarać?</label>
        <input type="text" id="targetNick" placeholder="@nickname" class="w-full bg-black/40 p-2 rounded text-[11px] mb-2 border border-gray-700 outline-none">
        
        <label class="text-[9px] text-gray-400 ml-1">Na ile (minuty) - dotyczy Mute</label>
        <input type="number" id="muteMinutes" placeholder="Np. 60" class="w-full bg-black/40 p-2 rounded text-[11px] mb-3 border border-gray-700 outline-none">
        
        <button onclick="admExec('give')" class="w-full bg-yellow-600 text-[10px] py-2 rounded mb-1 font-bold uppercase">Daj 1000 🪙</button>
        <button onclick="admExec('mute')" class="w-full bg-orange-600 text-[10px] py-2 rounded mb-1 font-bold uppercase">Mute Czasowy</button>
        <button onclick="admExec('block')" class="w-full bg-red-600 text-[10px] py-2 rounded font-bold uppercase">BAN NA ZAWSZE</button>
    </div>

    <!-- RICKROLL -->
    <div id="rickrollOverlay">
        <button onclick="closeRickroll()" class="absolute top-5 right-5 bg-red-600 px-6 py-2 rounded-xl font-bold">ZAMKNIJ</button>
        <iframe id="rickFrame"></iframe>
    </div>

    <!-- HEADER -->
    <header class="h-[70px] flex justify-between items-center px-4 bg-[#0f172a]/95 backdrop-blur-md border-b border-white/10 sticky top-0 z-[1000]">
        <div class="flex items-center gap-3">
            <img id="headerAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-10 h-10 rounded-full border border-blue-500">
            <div>
                <p id="headerNick" class="text-xs font-bold text-blue-400">...</p>
                <p class="text-yellow-500 font-bold text-[10px]"><span id="coinCountHeader">0</span> 🪙</p>
            </div>
        </div>
        <button id="crown" onclick="toggleAdmin()" class="hidden text-2xl">👑</button>
    </header>

    <main class="h-full w-full">
        <!-- CZAT -->
        <section id="chatTab" class="tab-content active">
            <div id="messages"></div>
            <div class="fixed bottom-20 left-0 w-full p-3 bg-[#0f172a]">
                <div class="flex gap-2 max-w-4xl mx-auto">
                    <input type="text" id="userInput" placeholder="Napisz coś..." class="flex-1 bg-gray-800 p-3 rounded-xl outline-none border border-gray-700">
                    <button id="sendBtn" class="bg-blue-600 px-5 rounded-xl font-bold">SŁIJ</button>
                </div>
            </div>
        </section>

        <!-- SKLEP (Skrócony dla czytelności) -->
        <section id="shopTab" class="tab-content p-5">
            <button onclick="buy('vip')" class="w-full bg-yellow-600 p-4 rounded-xl font-bold mb-2 text-sm">KUP VIP (1000 🪙)</button>
            <button onclick="buy('rick')" class="w-full bg-red-600 p-4 rounded-xl font-bold text-sm">RICKROLL (5000 🪙)</button>
        </section>

        <!-- PROFIL -->
        <section id="profileTab" class="tab-content p-5 text-center">
            <div id="ach1" class="p-4 bg-gray-800 rounded-xl mb-2 opacity-20">🎖️ NOWY REKRUT</div>
            <div id="ach2" class="p-4 bg-gray-800 rounded-xl opacity-20">💰 BOGACZ (1000+)</div>
            <p id="myUid" class="text-[8px] text-gray-600 mt-10"></p>
        </section>
    </main>

    <nav>
        <button id="btn-chat" class="active-nav" onclick="tab('chat')">💬</button>
        <button id="btn-shop" onclick="tab('shop')">🛒</button>
        <button id="btn-profile" onclick="tab('profile')">👤</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildChanged, remove, update, increment, onValue, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQXm-oMsOZg80gMrANDwxEbr2jWoV2I8A",
            authDomain: "mojczat-d50e5.firebaseapp.com",
            databaseURL: "https://mojczat-d50e5-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "mojczat-d50e5",
            storageBucket: "mojczat-d50e5.appspot.com",
            messagingSenderId: "278638325304",
            appId: "1:278638325304:web:d9ad946d17835af66680cd"
        };

        const ADMIN_UID = "YWuvOvKiNdbgGoQIVThBKfF22lY2";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userState = { coins: 0, registered: true };

        signInAnonymously(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if(user.uid === ADMIN_UID) document.getElementById('crown').classList.remove('hidden');
                document.getElementById('myUid').innerText = `ID: ${user.uid}`;
                
                onValue(ref(db, `users/${user.uid}`), (s) => {
                    const data = s.val() || {};
                    userState = data;
                    if(data.blocked) { document.body.innerHTML = "<h1>BAN NA ZAWSZE</h1>"; return; }
                    
                    document.getElementById('headerNick').innerText = data.nick || "Anonim";
                    document.getElementById('coinCountHeader').innerText = (data.coins || 0).toLocaleString();
                    if(data.coins >= 1000) document.getElementById('ach2').style.opacity = "1";
                    document.getElementById('ach1').style.opacity = "1";
                });
                loadMsgs();
            }
        });

        // FUNKCJA ADMINA - SZUKANIE PO NICKU
        window.admExec = async (action) => {
            let nick = document.getElementById('targetNick').value.trim();
            if(!nick.startsWith('@')) return alert("Wpisz nick zaczynając od @");
            nick = nick.replace('@', '');

            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            let foundUid = null;

            snapshot.forEach((child) => {
                if(child.val().nick === nick) foundUid = child.key;
            });

            if(!foundUid) return alert("Nie znaleziono takiego użytkownika!");

            const targetRef = ref(db, `users/${foundUid}`);

            if(action === 'give') {
                update(targetRef, { coins: increment(1000) });
                alert("Dodałeś 1000 monet użytkownikowi " + nick);
            } else if(action === 'mute') {
                const mins = parseInt(document.getElementById('muteMinutes').value) || 5;
                const until = Date.now() + (mins * 60 * 1000);
                update(targetRef, { mutedUntil: until });
                alert(`Wyciszono ${nick} na ${mins} minut.`);
            } else if(action === 'block') {
                update(targetRef, { blocked: true });
                alert(`Użytkownik ${nick} dostał BANA NA ZAWSZE.`);
            }
        };

        const send = async () => {
            const inp = document.getElementById('userInput');
            // Sprawdzenie muta
            if(userState.mutedUntil && Date.now() < userState.mutedUntil) {
                const left = Math.ceil((userState.mutedUntil - Date.now()) / 60000);
                return alert(`Jesteś wyciszony! Zostało: ${left} min.`);
            }
            if(!inp.value.trim()) return;

            const m = {
                text: inp.value.trim().substring(0,400).replace(/</g,"&lt;"),
                nick: userState.nick || "Anonim",
                uid: auth.currentUser.uid,
                vip: userState.vip || false,
                coinsAtTime: userState.coins || 0,
                time: serverTimestamp()
            };

            await push(ref(db, "messages"), m);
            update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(5) });
            inp.value = '';
        };

        function loadMsgs() {
            const box = document.getElementById('messages');
            onChildAdded(ref(db, "messages"), (s) => {
                const d = s.val();
                const div = document.createElement('div');
                div.className = `msg-container ${d.uid === auth.currentUser.uid ? 'me' : ''}`;
                div.innerHTML = `
                    <div class="msg-bubble ${d.vip ? 'vip-bubble' : ''} mb-3">
                        <p class="text-[7px] text-yellow-500 font-bold">${d.coinsAtTime} 🪙</p>
                        <p class="text-[9px] font-bold text-blue-400">${d.nick}</p>
                        <p class="text-xs">${d.text}</p>
                    </div>`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        }

        window.toggleAdmin = () => {
            const m = document.getElementById('adminMenu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };

        window.tab = (t) => {
            document.querySelectorAll('.tab-content, nav button').forEach(e => e.classList.remove('active', 'active-nav'));
            document.getElementById(`${t}Tab`).classList.add('active');
            document.getElementById(`btn-${t}`).classList.add('active-nav');
        };

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('userInput').onkeypress = (e) => e.key === 'Enter' && send();
    </script>
</body>
</html>
