<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CzatSZKOLA - THE FLAWLESS EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body { 
            overflow: hidden; height: 100dvh; margin: 0; 
            background-color: #0f172a; background-size: cover; background-position: center; 
            font-family: 'Inter', sans-serif; color: white; transition: background-image 0.5s ease-in-out;
        }
        
        /* TŁA */
        .theme-1 { background-image: url('Assets/wall/1.png') !important; }
        .theme-2 { background-image: url('Assets/wall/2.png') !important; }
        .theme-3 { background-image: url('Assets/wall/3.png') !important; }
        .theme-0 { background-color: #0f172a; background-image: none !important; }

        /* ZAKŁADKI */
        .tab-content { display: none; height: calc(100dvh - 80px); width: 100%; overflow-y: auto; padding-top: 10px; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); }
        
        /* WIADOMOŚCI */
        #messages { flex: 1; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 15px; }
        .msg-container { display: flex; gap: 10px; max-width: 85%; align-self: flex-start; }
        .msg-container.me { align-self: flex-end; flex-direction: row-reverse; }
        
        .msg-bubble { background: rgba(30, 41, 59, 0.95); padding: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); position: relative; word-break: break-word; }
        .me .msg-bubble { background: rgba(37, 99, 235, 0.25); border-color: rgba(37, 99, 235, 0.5); }
        
        .del-btn { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; font-weight: bold; border: 2px solid #0f172a; }
        
        .reaction-bar { display: flex; gap: 6px; margin-top: 8px; }
        .reaction { cursor: pointer; padding: 4px 10px; background: rgba(255,255,255,0.05); border-radius: 12px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); user-select: none; }
        .reaction:active { background: rgba(255,255,255,0.2); }

        /* INPUT CZATU */
        .input-area { position: fixed; bottom: 80px; left: 0; width: 100%; padding: 12px; z-index: 100; background: rgba(15, 23, 42, 0.95); border-top: 1px solid rgba(255,255,255,0.05); }

        /* NAWIGACJA DOLNA */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; z-index: 200; display: flex; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.1); }
        nav button { flex: 1; height: 100%; font-size: 24px; color: #64748b; transition: 0.3s; }
        nav button.active-nav { color: #3b82f6; border-top: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body id="mainBody" class="theme-0">

    <!-- NAGŁÓWEK -->
    <header class="h-[70px] flex justify-between items-center px-4 glass sticky top-0 z-[150] shadow-md">
        <div class="flex items-center gap-3">
            <img id="headerAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-11 h-11 rounded-full border-2 border-blue-500 object-cover">
            <h1 id="headerNick" class="text-base font-bold text-blue-400">Ładowanie...</h1>
        </div>
        <div class="bg-gray-800 border border-yellow-500/30 px-4 py-2 rounded-full flex items-center gap-2 shadow-lg">
            <span id="coinCount" class="text-yellow-400 font-bold text-sm">0</span>
            <span>🪙</span>
        </div>
    </header>

    <main class="relative h-full w-full">
        <!-- 1. ZAKŁADKA CZATU -->
        <section id="chatTab" class="tab-content active">
            <div id="messages"></div>
            <div class="input-area">
                <div class="flex gap-2 max-w-4xl mx-auto">
                    <input type="text" id="userInput" placeholder="Napisz wiadomość..." class="flex-1 bg-gray-800 text-white px-5 py-4 rounded-2xl outline-none border border-gray-700 focus:border-blue-500 transition-colors">
                    <button id="sendBtn" class="bg-blue-600 hover:bg-blue-500 px-6 py-4 rounded-2xl font-bold text-white transition-transform active:scale-95">Wyślij</button>
                </div>
            </div>
        </section>

        <!-- 2. ZAKŁADKA SKLEPU -->
        <section id="shopTab" class="tab-content p-6">
            <div class="max-w-md mx-auto">
                <h2 class="text-2xl font-black text-blue-400 mb-6 uppercase tracking-wider text-center">Sklep</h2>
                
                <div class="space-y-4">
                    <!-- RICKROLL BOX -->
                    <div class="bg-gray-800 p-5 rounded-3xl border border-red-500 flex justify-between items-center shadow-xl">
                        <div>
                            <p class="font-bold text-lg text-red-400">❓ Magiczne Pudełko</p>
                            <p class="text-xs text-gray-400">Legendarny artefakt internetu</p>
                        </div>
                        <button onclick="rickRoll()" class="bg-red-600 hover:bg-red-500 px-5 py-3 rounded-xl text-sm font-bold shadow-lg transition-transform active:scale-95">1 🪙</button>
                    </div>

                    <!-- VIP BOX (Przykładowy) -->
                    <div class="bg-gray-800 p-5 rounded-3xl border border-purple-500/50 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-lg text-purple-300">💎 Ranga VIP</p>
                            <p class="text-xs text-gray-400">Złoty nick na czacie</p>
                        </div>
                        <button onclick="buyItem('vip', 5000)" class="bg-purple-600 hover:bg-purple-500 px-5 py-3 rounded-xl text-sm font-bold shadow-lg transition-transform active:scale-95">5000 🪙</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 3. ZAKŁADKA PROFILU -->
        <section id="profileTab" class="tab-content p-6">
            <div class="max-w-md mx-auto space-y-6">
                <!-- DANE -->
                <div class="bg-gray-800 p-6 rounded-3xl border border-gray-700 shadow-xl">
                    <p class="text-xs font-bold text-gray-400 uppercase text-center mb-4 tracking-widest">Twoje Dane</p>
                    <div class="space-y-3">
                        <input type="text" id="nickInput" placeholder="Nowy Nick" class="w-full px-5 py-4 bg-gray-900 rounded-xl outline-none border border-gray-700 focus:border-blue-500">
                        <input type="text" id="avatarInput" placeholder="Link do obrazka (URL)" class="w-full px-5 py-4 bg-gray-900 rounded-xl outline-none border border-gray-700 focus:border-blue-500">
                        <button onclick="updateProfile()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold uppercase text-sm transition-transform active:scale-95">Zapisz Profil</button>
                    </div>
                </div>

                <!-- TAPETY -->
                <div class="bg-gray-800 p-6 rounded-3xl border border-gray-700 shadow-xl">
                    <p class="text-xs font-bold text-gray-400 uppercase text-center mb-4 tracking-widest">Wygląd Czatu</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setTheme(0)" class="p-4 bg-gray-900 rounded-xl text-xs font-bold border border-gray-700 hover:border-blue-500">BEZ TŁA</button>
                        <button onclick="setTheme(1)" class="p-4 bg-blue-900/30 border border-blue-500 rounded-xl text-xs font-bold hover:bg-blue-900/50">TAPETA 1</button>
                        <button onclick="setTheme(2)" class="p-4 bg-purple-900/30 border border-purple-500 rounded-xl text-xs font-bold hover:bg-purple-900/50">TAPETA 2</button>
                        <button onclick="setTheme(3)" class="p-4 bg-green-900/30 border border-green-500 rounded-xl text-xs font-bold hover:bg-green-900/50">TAPETA 3</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- NAWIGACJA -->
    <nav>
        <button id="nav-chat" class="active-nav" onclick="showTab('chat')">💬</button>
        <button id="nav-shop" onclick="showTab('shop')">🛒</button>
        <button id="nav-profile" onclick="showTab('profile')">⚙️</button>
    </nav>

    <!-- LOGIKA FIREBASE I APLIKACJI -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, onChildChanged, remove, update, increment, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 1. KONFIGURACJA
        const firebaseConfig = {
            apiKey: "AIzaSyCQXm-oMsOZg80gMrANDwxEbr2jWoV2I8A",
            authDomain: "mojczat-d50e5.firebaseapp.com",
            databaseURL: "https://mojczat-d50e5-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "mojczat-d50e5",
            storageBucket: "mojczat-d50e5.appspot.com",
            messagingSenderId: "278638325304",
            appId: "1:278638325304:web:d9ad946d17835af66680cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userData = { coins: 0, nick: 'Anonim', avatar: '' };

        // 2. KRYTYCZNA POPRAWKA - AUTOMATYCZNE LOGOWANIE
        signInAnonymously(auth).catch((error) => {
            console.error("Błąd logowania Firebase:", error);
            alert("Nie udało się połączyć z bazą danych.");
        });

        // 3. OBSŁUGA STANU UŻYTKOWNIKA
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Pobieranie danych użytkownika w czasie rzeczywistym
                onValue(ref(db, `users/${user.uid}`), (snapshot) => {
                    if(snapshot.exists()){
                        userData = snapshot.val();
                    }
                    // Aktualizacja UI (Nagłówek)
                    document.getElementById('headerNick').innerText = userData.nick || `User_${user.uid.substring(0,4)}`;
                    document.getElementById('coinCount').innerText = (userData.coins || 0).toLocaleString();
                    document.getElementById('headerAvatar').src = userData.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                });
                
                // Ładowanie wiadomości po zalogowaniu
                loadMessages();
            }
        });

        // 4. FUNKCJE GLOBALNE DLA HTML (window.)
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            
            document.getElementById(`${tabId}Tab`).classList.add('active');
            document.getElementById(`nav-${tabId}`).classList.add('active-nav');
        };

        window.setTheme = (themeId) => {
            document.getElementById('mainBody').className = `theme-${themeId}`;
            localStorage.setItem('chatSZKOLA_theme', themeId);
        };

        window.updateProfile = () => {
            const newNick = document.getElementById('nickInput').value.trim();
            const newAvatar = document.getElementById('avatarInput').value.trim();
            
            const updates = {};
            if(newNick) updates.nick = newNick;
            if(newAvatar) updates.avatar = newAvatar;

            if(Object.keys(updates).length > 0 && auth.currentUser) {
                update(ref(db, `users/${auth.currentUser.uid}`), updates)
                    .then(() => {
                        alert("Profil zaktualizowany!");
                        document.getElementById('nickInput').value = '';
                        document.getElementById('avatarInput').value = '';
                    });
            }
        };

        window.rickRoll = () => {
            if(!auth.currentUser) return;
            if((userData.coins || 0) < 1) {
                alert("Potrzebujesz minimum 1 monety!");
                return;
            }
            // Zabieramy monete i otwieramy link
            update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(-1) });
            window.open("https://www.youtube.com/watch?v=QDia3e12czc", "_blank");
        };

        window.buyItem = (item, price) => {
            if(!auth.currentUser) return;
            if((userData.coins || 0) < price) {
                alert("Za mało monet!");
                return;
            }
            update(ref(db, `users/${auth.currentUser.uid}`), { 
                coins: increment(-price),
                [`inventory/${item}`]: true 
            }).then(() => alert("Kupiono pomyślnie!"));
        };

        // 5. OBSŁUGA CZATU I BAZY DANYCH
        const sendMessage = async () => {
            const inputField = document.getElementById('userInput');
            let text = inputField.value.trim();
            if(!text || !auth.currentUser) return;

            // Zabezpieczenie przed atakami (proste escape'owanie HTML)
            text = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");

            const newMessage = {
                text: text,
                nick: userData.nick || `User_${auth.currentUser.uid.substring(0,4)}`,
                avatar: userData.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
                uid: auth.currentUser.uid,
                reactions: { heart: 0, fire: 0 },
                time: serverTimestamp()
            };

            await push(ref(db, "messages"), newMessage);
            // Zarobek +10 monet za wysłanie
            await update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(10) });
            
            inputField.value = '';
        };

        window.deleteMsg = (msgId) => {
            if(confirm("Na pewno usunąć tę wiadomość?")) {
                remove(ref(db, `messages/${msgId}`));
            }
        };

        window.addReaction = (msgId, type) => {
            update(ref(db, `messages/${msgId}/reactions`), { [type]: increment(1) });
        };

        let messagesLoaded = false;
        function loadMessages() {
            if(messagesLoaded) return; // Zapobiega podwójnemu nasłuchiwaniu
            messagesLoaded = true;
            
            const msgBox = document.getElementById('messages');
            msgBox.innerHTML = ''; // Czyszczenie przed załadowaniem

            // DODAWANIE WIADOMOŚCI
            onChildAdded(ref(db, "messages"), (snapshot) => {
                const data = snapshot.val();
                const msgId = snapshot.key;
                const isMe = data.uid === auth.currentUser.uid;
                
                const div = document.createElement('div');
                div.id = `msg-${msgId}`;
                div.className = `msg-container ${isMe ? 'me' : ''}`;
                
                div.innerHTML = `
                    <img src="${data.avatar}" class="w-10 h-10 rounded-full object-cover border border-gray-600 flex-shrink-0">
                    <div class="msg-bubble">
                        ${isMe ? `<div class="del-btn" onclick="deleteMsg('${msgId}')">×</div>` : ''}
                        <p class="text-[10px] font-bold text-blue-400 mb-1 leading-none">${data.nick}</p>
                        <p class="text-sm text-gray-100">${data.text}</p>
                        <div class="reaction-bar" id="re-${msgId}">
                            <span class="reaction" onclick="addReaction('${msgId}', 'heart')">❤️ ${data.reactions?.heart || 0}</span>
                            <span class="reaction" onclick="addReaction('${msgId}', 'fire')">🔥 ${data.reactions?.fire || 0}</span>
                        </div>
                    </div>
                `;
                msgBox.appendChild(div);
                // Przewijanie na sam dół po nowej wiadomości
                window.scrollTo(0, document.body.scrollHeight);
                msgBox.scrollTop = msgBox.scrollHeight;
            });

            // AKTUALIZACJA REAKCJI
            onChildChanged(ref(db, "messages"), (snapshot) => {
                const data = snapshot.val();
                const reactionBar = document.getElementById(`re-${snapshot.key}`);
                if(reactionBar) {
                    reactionBar.innerHTML = `
                        <span class="reaction" onclick="addReaction('${snapshot.key}', 'heart')">❤️ ${data.reactions?.heart || 0}</span>
                        <span class="reaction" onclick="addReaction('${snapshot.key}', 'fire')">🔥 ${data.reactions?.fire || 0}</span>
                    `;
                }
            });

            // USUWANIE WIADOMOŚCI Z EKRANU
            onChildRemoved(ref(db, "messages"), (snapshot) => {
                const element = document.getElementById(`msg-${snapshot.key}`);
                if(element) element.remove();
            });
        }

        // EVENT LISENERY
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') sendMessage(); 
        });

        // INICJALIZACJA ZAPISANEJ TAPETY
        const savedTheme = localStorage.getItem('chatSZKOLA_theme');
        if(savedTheme) {
            setTheme(savedTheme);
        }
    </script>
</body>
</html>
