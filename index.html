<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CzatSZKOLA - Sklep Przywrócony</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Merriweather&family=Orbitron:wght@400;700&display=swap');

        body { 
            overflow: hidden; height: 100dvh; margin: 0; 
            background-color: #0f172a; background-size: cover; background-position: center; transition: 0.5s;
        }
        
        .font-modern { font-family: 'Inter', sans-serif; }
        .font-classic { font-family: 'Merriweather', serif; }
        .font-gaming { font-family: 'Orbitron', sans-serif; }

        .tab-content { display: none; height: calc(100dvh - 80px); width: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); }
        
        .input-area { position: fixed; bottom: 80px; left: 0; width: 100%; padding: 12px; z-index: 100; }
        
        .theme-1 { background-image: url('Assets/wall/1.png'); }
        .theme-2 { background-image: url('Assets/wall/2.png'); }
        .theme-3 { background-image: url('Assets/wall/3.png'); }
        .theme-0 { background-color: #0f172a; }

        #messages { flex: 1; padding: 20px; padding-bottom: 200px; display: flex; flex-direction: column; gap: 15px; }
        .msg-container { display: flex; gap: 10px; max-width: 85%; align-self: flex-start; }
        .msg-container.me { align-self: flex-end; flex-direction: row-reverse; }
        
        .msg-bubble { background: rgba(30, 41, 59, 0.9); padding: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .me .msg-bubble { background: rgba(37, 99, 235, 0.3); border-color: rgba(37, 99, 235, 0.5); }
        
        .reaction-bar { display: flex; gap: 6px; margin-top: 8px; }
        .reaction { cursor: pointer; padding: 2px 8px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 11px; border: 1px solid rgba(255,255,255,0.1); }

        .del-btn { position: absolute; top: -5px; right: -5px; background: #ef4444; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; font-weight: bold; }

        nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; z-index: 200; }
        nav button { flex: 1; height: 100%; font-size: 1.8rem; transition: 0.3s; }
        nav button:active { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body id="mainBody" class="theme-0 text-white font-modern">

    <header class="h-[70px] border-b border-gray-800 flex justify-between items-center px-4 glass sticky top-0 z-[150]">
        <div class="flex items-center gap-3">
            <img id="headerAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-10 h-10 rounded-full border-2 border-blue-500 object-cover">
            <h1 id="headerNick" class="text-sm font-bold text-blue-400 italic">CzatSZKOLA</h1>
        </div>
        <span id="coinCount" class="text-yellow-400 font-bold text-[14px] bg-gray-900 px-3 py-1 rounded-full border border-yellow-400/30">0 🪙</span>
    </header>

    <main class="relative h-full w-full">
        <!-- CZAT -->
        <section id="chatTab" class="tab-content active">
            <div id="messages"></div>
            <div class="input-area glass">
                <div class="flex gap-2 max-w-5xl mx-auto">
                    <input type="text" id="userInput" placeholder="Twoja wiadomość..." class="flex-1 bg-gray-800 p-4 rounded-2xl outline-none border border-gray-700">
                    <button id="sendBtn" class="bg-blue-600 px-6 py-4 rounded-2xl font-bold">></button>
                </div>
            </div>
        </section>

        <!-- SKLEP -->
        <section id="shopTab" class="tab-content p-6">
            <h2 class="text-2xl font-black text-blue-400 mb-6 uppercase italic">Sklep Monet</h2>
            <div class="space-y-4">
                <div class="bg-gray-800/80 p-5 rounded-3xl border border-purple-500/50 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-lg">💎 Ranga Premium</p>
                        <p class="text-[10px] text-gray-400">Specjalny status i ramka</p>
                    </div>
                    <button onclick="buyItem('premium', 5000)" class="bg-purple-600 px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-purple-900/40">5,000 🪙</button>
                </div>
                <div class="bg-gray-800/80 p-5 rounded-3xl border border-blue-500/50 flex justify-between items-center opacity-50">
                    <div>
                        <p class="font-bold">✨ Złoty Kolor Nicku</p>
                        <p class="text-[10px] text-gray-400">Wkrótce...</p>
                    </div>
                    <button class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold cursor-not-allowed">2,500 🪙</button>
                </div>
            </div>
        </section>

        <!-- PROFIL -->
        <section id="profileTab" class="tab-content p-6">
            <div class="max-w-sm mx-auto space-y-6">
                <div class="space-y-3 bg-gray-900/50 p-4 rounded-3xl border border-gray-800 shadow-xl">
                    <p class="text-[10px] font-bold text-gray-500 uppercase text-center">Profil</p>
                    <input type="text" id="nickInput" placeholder="Nowy Nick" class="w-full p-4 bg-gray-800 rounded-2xl outline-none border border-gray-700 text-sm">
                    <input type="text" id="avatarInput" placeholder="Link do zdjęcia" class="w-full p-4 bg-gray-800 rounded-2xl outline-none border border-gray-700 text-sm">
                    <button onclick="updateProfile()" class="w-full bg-green-600 py-4 rounded-2xl font-bold uppercase text-xs">Zapisz Zmiany</button>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setFont('font-modern')" class="p-2 bg-gray-800 rounded-xl text-[9px] border border-gray-600">MODERN</button>
                    <button onclick="setFont('font-classic')" class="p-2 bg-gray-800 rounded-xl text-[9px] border border-gray-600">CLASSIC</button>
                    <button onclick="setFont('font-gaming')" class="p-2 bg-gray-800 rounded-xl text-[9px] border border-gray-600">GAMER</button>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setTheme(0)" class="p-3 bg-slate-800 rounded-xl text-[10px]">DOMYŚLNE</button>
                    <button onclick="setTheme(1)" class="p-3 bg-blue-900/40 border border-blue-500 rounded-xl text-[10px]">TAPETA 1</button>
                    <button onclick="setTheme(2)" class="p-3 bg-purple-900/40 border border-purple-500 rounded-xl text-[10px]">TAPETA 2</button>
                    <button onclick="setTheme(3)" class="p-3 bg-green-900/40 border border-green-500 rounded-xl text-[10px]">TAPETA 3</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="glass flex justify-around items-center border-t border-gray-800">
        <button onclick="showTab('chat')">💬</button>
        <button onclick="showTab('shop')">🛒</button>
        <button onclick="showTab('profile')">⚙️</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, onChildChanged, remove, update, increment, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.app/";

        const firebaseConfig = {
            apiKey: "AIzaSyCQXm-oMsOZg80gMrANDwxEbr2jWoV2I8A",
            authDomain: "mojczat-d50e5.firebaseapp.com",
            databaseURL: "https://mojczat-d50e5-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "mojczat-d50e5",
            storageBucket: "mojczat-d50e5.appspot.com",
            messagingSenderId: "278638325304",
            appId: "1:278638325304:web:d9ad946d17835af66680cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const badWords = ["dupa", "kurde", "brzydkie"];
        let userData = {};

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, `users/${user.uid}`), (s) => {
                    userData = s.val() || {};
                    document.getElementById('headerNick').innerText = userData.nick || user.email;
                    document.getElementById('coinCount').innerText = `${(userData.coins || 0).toLocaleString()} 🪙`;
                    document.getElementById('headerAvatar').src = userData.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                });
                loadMessages();
            }
        });

        window.updateProfile = () => {
            const nick = document.getElementById('nickInput').value.trim();
            const avatar = document.getElementById('avatarInput').value.trim();
            const up = {};
            if(nick) up.nick = nick;
            if(avatar) up.avatar = avatar;
            update(ref(db, `users/${auth.currentUser.uid}`), up).then(() => alert("Profil zaktualizowany!"));
        };

        window.buyItem = async (type, price) => {
            if((userData.coins || 0) < price) return alert("Brak środków! Pisz na czacie, by zarabiać.");
            const up = {};
            up[`users/${auth.currentUser.uid}/coins`] = increment(-price);
            if(type === 'premium') up[`users/${auth.currentUser.uid}/premium`] = true;
            await update(ref(db), up);
            alert("Dziękujemy za zakup!");
        };

        window.setFont = (f) => {
            document.body.classList.remove('font-modern', 'font-classic', 'font-gaming');
            document.body.classList.add(f);
            localStorage.setItem('user_font', f);
        };

        const sendMessage = async () => {
            const input = document.getElementById('userInput');
            let text = input.value.trim();
            if(!text) return;
            badWords.forEach(w => { text = text.replace(new RegExp(w, "gi"), "***"); });

            await push(ref(db, "messages"), {
                text: text,
                nick: userData.nick || auth.currentUser.email,
                avatar: userData.avatar || '',
                uid: auth.currentUser.uid,
                reactions: { heart: 0, funny: 0, fire: 0 },
                time: serverTimestamp()
            });
            // Dodawanie monet za pisanie
            await update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(10) });
            input.value = '';
        };

        window.addReaction = (id, type) => {
            update(ref(db, `messages/${id}/reactions`), { [type]: increment(1) });
        };

        window.deleteMsg = (id) => {
            if(confirm("Usunąć wiadomość?")) remove(ref(db, `messages/${id}`));
        };

        function loadMessages() {
            const mBox = document.getElementById('messages');
            onChildAdded(ref(db, "messages"), (s) => {
                const d = s.val();
                const id = s.key;
                const isMe = d.uid === auth.currentUser.uid;
                const div = document.createElement('div');
                div.id = `msg-${id}`;
                div.className = `msg-container ${isMe ? 'me' : ''}`;
                div.innerHTML = `
                    <img src="${d.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="w-8 h-8 rounded-full object-cover">
                    <div class="msg-bubble shadow-lg">
                        ${isMe ? `<div class="del-btn" onclick="deleteMsg('${id}')">×</div>` : ''}
                        <p class="text-[9px] font-bold text-blue-400 mb-1">${d.nick}</p>
                        <p class="text-sm">${d.text}</p>
                        <div class="reaction-bar" id="re-${id}">
                            <span class="reaction" onclick="addReaction('${id}', 'heart')">❤️ ${d.reactions?.heart || 0}</span>
                            <span class="reaction" onclick="addReaction('${id}', 'funny')">😂 ${d.reactions?.funny || 0}</span>
                            <span class="reaction" onclick="addReaction('${id}', 'fire')">🔥 ${d.reactions?.fire || 0}</span>
                        </div>
                    </div>`;
                mBox.appendChild(div);
                mBox.scrollTop = mBox.scrollHeight;
            });

            onChildChanged(ref(db, "messages"), (s) => {
                const d = s.val();
                const rBar = document.getElementById(`re-${s.key}`);
                if(rBar) {
                    rBar.innerHTML = `
                        <span class="reaction" onclick="addReaction('${s.key}', 'heart')">❤️ ${d.reactions?.heart || 0}</span>
                        <span class="reaction" onclick="addReaction('${s.key}', 'funny')">😂 ${d.reactions?.funny || 0}</span>
                        <span class="reaction" onclick="addReaction('${s.key}', 'fire')">🔥 ${d.reactions?.fire || 0}</span>`;
                }
            });

            onChildRemoved(ref(db, "messages"), (s) => {
                document.getElementById(`msg-${s.key}`)?.remove();
            });
        }

        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
        };

        window.setTheme = (n) => {
            const font = document.body.classList.contains('font-classic') ? 'font-classic' : 
                         document.body.classList.contains('font-gaming') ? 'font-gaming' : 'font-modern';
            document.body.className = `${font} text-white theme-${n}`;
            localStorage.setItem('user_theme', n);
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        
        const st = localStorage.getItem('user_theme'); if(st) setTheme(st);
        const sf = localStorage.getItem('user_font'); if(sf) setFont(sf);
    </script>
</body>
</html>
