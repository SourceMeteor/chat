<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backup Systemu - Czat i Sklep</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; }
        #chat-box { width: 400px; height: 300px; border: 1px solid #444; overflow-y: auto; margin-bottom: 10px; background: #222; padding: 10px; }
        .msg { margin-bottom: 8px; padding: 5px; border-radius: 5px; }
        .admin { border-left: 4px solid gold; background: #332b00; }
        .vip { border-left: 4px solid #00f2ff; background: #002b33; }
        .user { background: #333; }
        .stats { font-size: 1.2rem; margin: 20px; color: gold; }
        .shop { border: 1px solid #555; padding: 15px; border-radius: 10px; }
        input { padding: 10px; width: 300px; border: none; border-radius: 5px; }
        button { padding: 10px; cursor: pointer; background: #444; color: white; border: 1px solid #666; }
        button:hover { background: #666; }
    </style>
</head>
<body>

    <div class="stats">💰 Monety: <span id="coinCountHeader">0</span></div>

    <div id="chat-box"></div>
    
    <div style="margin-bottom: 20px;">
        <input type="text" id="messageInput" placeholder="Napisz wiadomość...">
        <button id="sendBtn">Wyślij</button>
    </div>

    <div class="shop">
        <h3>🛒 Sklep</h3>
        <button onclick="buyItem('vip', 500)">Kup VIP (500 💰)</button>
        <button onclick="buyItem('crown', 1500)">Kup Koronę Admina (1500 💰)</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
