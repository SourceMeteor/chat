<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CzatSZKOLA - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { overflow: hidden; height: 100dvh; margin: 0; font-family: sans-serif; background: #0f172a; color: white; }
        .tab-content { display: none; height: calc(100dvh - 160px); width: 100%; overflow-y: auto; padding-bottom: 100px; }
        .tab-content.active { display: flex; flex-direction: column; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); }
        .premium-border { border: 2px solid #a855f7 !important; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        nav button { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: background 0.2s; }
        nav button:active { background: rgba(255,255,255,0.1); }
        #messages { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 20px; }
        .bg-space { background: #0f172a; }
        .bg-sunset { background: linear-gradient(to bottom, #4c1d95, #831843); }
        .bg-forest { background: linear-gradient(to bottom, #064e3b, #022c22); }
        .bg-matrix { background: #000; border-top: 2px solid #00ff41; }
    </style>
</head>
<body id="mainBody" class="bg-space">

    <!-- LOGIN -->
    <div id="loginScreen" class="fixed inset-0 z-[1000] bg-gray-900 flex items-center justify-center p-6" style="display: none;">
        <div class="w-full max-w-sm space-y-4 bg-gray-800 p-8 rounded-3xl">
            <h2 class="text-3xl font-black text-blue-500 text-center italic">CzatSZKOLA</h2>
            <input type="email" id="emailInput" placeholder="E-mail" class="w-full p-4 bg-gray-700 rounded-2xl outline-none">
            <input type="password" id="passwordInput" placeholder="Hasło" class="w-full p-4 bg-gray-700 rounded-2xl outline-none">
            <button id="loginBtn" class="w-full bg-blue-600 py-4 rounded-2xl font-bold">Zaloguj</button>
            <button id="registerBtn" class="w-full bg-gray-700 py-3 rounded-xl text-xs">Rejestracja</button>
        </div>
    </div>

    <!-- HEADER -->
    <header class="h-[70px] border-b border-gray-800 flex justify-between items-center px-4 glass sticky top-0 z-[500]">
        <div class="flex items-center gap-3">
            <img id="headerAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-10 h-10 rounded-full border-2 border-blue-500 object-cover">
            <div>
                <h1 id="headerNick" class="text-sm font-bold text-blue-400">Ładowanie...</h1>
                <div class="flex gap-2">
                    <span id="coinCount" class="text-yellow-400 font-bold text-[10px]">0 🪙</span>
                    <span id="premiumBadge" class="hidden text-[8px] bg-purple-600 px-1 rounded font-bold uppercase">Premium</span>
                </div>
            </div>
        </div>
    </header>

    <main class="relative h-full w-full">
        <!-- CZAT -->
        <section id="chatTab" class="tab-content active">
            <div id="messages"></div>
            <div class="fixed bottom-[80px] left-0 w-full p-4 glass z-[400]">
                <div class="flex gap-2 max-w-5xl mx-auto">
                    <input type="text" id="userInput" placeholder="Napisz..." class="flex-1 bg-gray-800 p-4 rounded-2xl outline-none text-sm border border-gray-700">
                    <button id="sendBtn" class="bg-blue-600 px-6 py-4 rounded-2xl font-bold">></button>
                </div>
            </div>
        </section>

        <!-- SKLEP -->
        <section id="settingsTab" class="tab-content p-6">
            <h3 class="text-xl font-black text-blue-400 mb-4 uppercase italic">Sklep</h3>
            <div class="space-y-4">
                <div class="bg-gray-800 p-4 rounded-2xl border-2 border-purple-500 flex justify-between items-center">
                    <span>💎 Premium (10k)</span>
                    <button onclick="buyItem('premium', 10000)" class="bg-purple-600 px-4 py-2 rounded-xl text-xs">Kup</button>
                </div>
                <button onclick="buyItem('confetti', 100)" class="w-full bg-gray-800 p-4 rounded-2xl border border-blue-500 flex justify-between">
                    <span>🎉 Konfetti (30s CD)</span><span id="confettiPrice">100 🪙</span>
                </button>
            </div>
        </section>

        <!-- PROFIL -->
        <section id="profileTab" class="tab-content p-6 text-center">
            <div class="space-y-6 max-w-sm mx-auto">
                <h3 class="text-xl font-black text-blue-400 uppercase">Ustawienia</h3>
                <input type="text" id="nickInput" placeholder="Nick" class="w-full p-4 bg-gray-800 rounded-2xl outline-none">
                <input type="text" id="avatarInput" placeholder="Link do zdjęcia" class="w-full p-4 bg-gray-800 rounded-2xl outline-none">
                <button onclick="saveProfile()" class="w-full bg-green-600 py-4 rounded-2xl font-bold">Zapisz profil</button>
                
                <div class="grid grid-cols-2 gap-2 pt-4">
                    <button onclick="setTheme('space')" class="p-2 bg-slate-800 rounded-lg text-xs">Kosmos</button>
                    <button onclick="setTheme('sunset')" class="p-2 bg-pink-900 rounded-lg text-xs">Zachód</button>
                    <button onclick="setTheme('forest')" class="p-2 bg-emerald-900 rounded-lg text-xs">Las</button>
                    <button onclick="setTheme('matrix')" class="p-2 bg-black border border-green-500 rounded-lg text-xs">Matrix</button>
                </div>
                
                <button id="logoutBtn" class="w-full mt-8 text-red-500 text-xs font-bold uppercase tracking-widest">Wyloguj Się</button>
            </div>
        </section>
    </main>

    <!-- MENU DOLNE -->
    <nav class="fixed bottom-0 left-0 w-full h-[80px] glass flex justify-around items-center z-[600]">
        <button onclick="showTab('chat')">💬</button>
        <button onclick="showTab('settings')">🛒</button>
        <button onclick="showTab('profile')">⚙️</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onValue, serverTimestamp, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQXm-oMsOZg80gMrANDwxEbr2jWoV2I8A",
            authDomain: "mojczat-d50e5.firebaseapp.com",
            databaseURL: "https://mojczat-d50e5-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "mojczat-d50e5",
            storageBucket: "mojczat-d50e5.appspot.com",
            messagingSenderId: "278638325304",
            appId: "1:278638325304:web:d9ad946d17835af66680cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userCoins = 0;
        let userData = {};
        let isConfettiCooldown = false;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                onValue(ref(db, `users/${user.uid}`), (s) => {
                    const d = s.val() || {};
                    userData = d;
                    userCoins = d.coins || 0;
                    document.getElementById('coinCount').innerText = `${userCoins.toLocaleString()} 🪙`;
                    document.getElementById('headerNick').innerText = d.nick || user.email;
                    document.getElementById('headerAvatar').src = d.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    if(d.premium) document.getElementById('premiumBadge').classList.remove('hidden');
                });
                loadMessages();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
            }
        });

        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
        };

        const sendMessage = async () => {
            const input = document.getElementById('userInput');
            if(!input.value.trim()) return;
            await push(ref(db, "messages"), {
                text: input.value,
                nick: userData.nick || auth.currentUser.email,
                avatar: userData.avatar || '',
                isPremium: userData.premium || false,
                time: serverTimestamp()
            });
            await update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(5) });
            input.value = '';
        };

        function loadMessages() {
            const mBox = document.getElementById('messages');
            mBox.innerHTML = '';
            onChildAdded(ref(db, "messages"), (s) => {
                const d = s.val();
                const div = document.createElement('div');
                div.className = `flex gap-2 mb-2 ${d.nick === (userData.nick || auth.currentUser.email) ? 'flex-row-reverse' : ''}`;
                div.innerHTML = `
                    <img src="${d.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="w-6 h-6 rounded-full">
                    <div class="p-3 rounded-2xl max-w-[70%] bg-gray-800 ${d.isPremium ? 'premium-border' : ''}">
                        <p class="text-[8px] opacity-50">${d.nick}</p>
                        <p class="text-sm">${d.text}</p>
                    </div>`;
                mBox.appendChild(div);
                mBox.scrollTop = mBox.scrollHeight;
            });
        }

        window.saveProfile = () => {
            update(ref(db, `users/${auth.currentUser.uid}`), {
                nick: document.getElementById('nickInput').value,
                avatar: document.getElementById('avatarInput').value
            }).then(() => alert("Zapisano!"));
        };

        window.setTheme = (t) => {
            document.getElementById('mainBody').className = 'bg-' + t;
            localStorage.setItem('theme', t);
        };

        window.buyItem = async (type, price) => {
            if(userCoins < price) return alert("Brak monet!");
            const up = {};
            up[`users/${auth.currentUser.uid}/coins`] = increment(-price);
            if(type === 'premium') up[`users/${auth.currentUser.uid}/premium`] = true;
            await update(ref(db), up);
            alert("Kupiono!");
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
        document.getElementById('registerBtn').onclick = () => createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

        if(localStorage.getItem('theme')) setTheme(localStorage.getItem('theme'));
    </script>
</body>
</html>
