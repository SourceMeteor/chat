<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CzatSZKOLA - GOLD & ADMIN EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { overflow: hidden; height: 100dvh; margin: 0; background-color: #0f172a; font-family: 'Inter', sans-serif; color: white; background-size: cover; background-position: center; transition: 0.5s; }
        
        /* TAPETY */
        .theme-1 { background-image: url('Assets/wall/1.png') !important; }
        .theme-2 { background-image: url('Assets/wall/2.png') !important; }
        .theme-3 { background-image: url('Assets/wall/3.png') !important; }
        .theme-0 { background-color: #0f172a; }

        .tab-content { display: none; height: calc(100dvh - 80px); width: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); }
        
        /* WIADOMOŚCI */
        #messages { flex: 1; padding: 15px; padding-bottom: 120px; display: flex; flex-direction: column; gap: 18px; }
        .msg-container { display: flex; gap: 10px; max-width: 85%; align-self: flex-start; position: relative; }
        .msg-container.me { align-self: flex-end; flex-direction: row-reverse; }
        
        .msg-bubble { background: rgba(30, 41, 59, 0.95); padding: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .me .msg-bubble { background: rgba(37, 99, 235, 0.25); border-color: rgba(37, 99, 235, 0.5); }
        .vip-bubble { border: 1px solid #eab308 !important; box-shadow: 0 0 10px rgba(234,179,8,0.3); }

        /* OSIĄGNIĘCIA */
        .ach-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; display: flex; align-items: center; gap: 10px; opacity: 0.4; grayscale: 100%; transition: 0.3s; }
        .ach-card.unlocked { opacity: 1; grayscale: 0; border-color: #eab308; background: rgba(234,179,8,0.1); }

        /* PANEL ADMINA */
        #adminPanel { display: none; position: fixed; top: 80px; right: 10px; width: 200px; background: #1e293b; border: 2px solid #ef4444; border-radius: 20px; padding: 15px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        #rickrollOverlay { display: none; position: fixed; inset: 0; z-index: 9999; background: black; }
        #rickrollOverlay iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body id="mainBody" class="theme-0">

    <!-- ADMIN OVERLAY -->
    <div id="adminPanel">
        <h3 class="text-red-500 font-bold text-xs mb-3 uppercase">Panel Zarządzania</h3>
        <input type="text" id="targetUid" placeholder="UID Gracza" class="w-full bg-black/30 p-2 rounded text-[10px] mb-2 outline-none">
        <button onclick="adminGiveCoins()" class="w-full bg-yellow-600 text-[10px] py-1 rounded mb-1">Daj 1000 🪙</button>
        <button onclick="adminMute()" class="w-full bg-orange-600 text-[10px] py-1 rounded mb-1">Mute / Unmute</button>
        <button onclick="adminBlock()" class="w-full bg-red-600 text-[10px] py-1 rounded">Blokuj / Odblokuj</button>
    </div>

    <!-- RICKROLL -->
    <div id="rickrollOverlay">
        <button onclick="closeRickroll()" class="absolute top-5 right-5 bg-red-600 px-4 py-2 rounded-xl font-bold">ZAMKNIJ</button>
        <iframe id="rickFrame"></iframe>
    </div>

    <!-- HEADER -->
    <header class="h-[75px] flex justify-between items-center px-4 glass sticky top-0 z-[150]">
        <div class="flex items-center gap-3">
            <img id="headerAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-12 h-12 rounded-full border-2 border-blue-500 object-cover">
            <div>
                <h1 id="headerNick" class="text-sm font-bold text-blue-400">Ładowanie...</h1>
                <div id="coinCountHeader" class="text-yellow-500 font-bold text-xs">0 🪙</div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <!-- PRZYCISK ADMINA (KORONA) -->
            <button id="adminBtn" onclick="toggleAdminPanel()" class="hidden text-2xl">👑</button>
            <div id="vipBadge" class="hidden bg-yellow-500 text-black text-[9px] px-2 py-1 rounded-full font-black">VIP</div>
        </div>
    </header>

    <main class="relative h-full w-full">
        <!-- CZAT -->
        <section id="chatTab" class="tab-content active">
            <div id="messages"></div>
            <div class="fixed bottom-20 left-0 w-full p-3 glass z-[100]">
                <div class="flex gap-2 max-w-4xl mx-auto">
                    <input type="text" id="userInput" placeholder="Napisz coś..." class="flex-1 bg-gray-800 p-4 rounded-2xl outline-none">
                    <button id="sendBtn" class="bg-blue-600 px-6 rounded-2xl font-bold">WYŚLIJ</button>
                </div>
            </div>
        </section>

        <!-- SKLEP -->
        <section id="shopTab" class="tab-content p-6">
            <div class="max-w-md mx-auto space-y-4">
                <div class="bg-gray-800 p-5 rounded-3xl border border-red-500 flex justify-between items-center">
                    <div><p class="font-bold text-red-400">Przycisk Zagłady</p><p class="text-[10px] text-gray-400">Full screen Rickroll</p></div>
                    <button onclick="buyRickroll()" class="bg-red-600 px-4 py-2 rounded-xl text-xs font-bold">5000 🪙</button>
                </div>
                <div class="bg-gray-800 p-5 rounded-3xl border border-yellow-500 flex justify-between items-center">
                    <div><p class="font-bold text-yellow-500">Status VIP</p><p class="text-[10px] text-gray-400">Złoty nick i ramka</p></div>
                    <button onclick="buyVIP()" class="bg-yellow-600 px-4 py-2 rounded-xl text-xs font-bold">1000 🪙</button>
                </div>
            </div>
        </section>

        <!-- PROFIL I OSIĄGNIĘCIA -->
        <section id="profileTab" class="tab-content p-6">
            <div class="max-w-md mx-auto space-y-6">
                <div class="bg-gray-800 p-6 rounded-3xl border border-gray-700">
                    <p class="text-center text-xs font-bold text-gray-500 mb-4 uppercase">Dane Użytkownika</p>
                    <input type="text" id="nickInput" placeholder="Nowy Nick" class="w-full p-4 bg-gray-900 rounded-xl mb-2 border border-gray-700">
                    <input type="text" id="avatarInput" placeholder="URL Awatara" class="w-full p-4 bg-gray-900 rounded-xl mb-4 border border-gray-700">
                    <button onclick="updateProfile()" class="w-full bg-blue-600 py-4 rounded-xl font-bold uppercase text-xs">Zastosuj</button>
                    <p id="userUidDisplay" class="text-[8px] text-gray-600 mt-4 text-center select-all"></p>
                </div>

                <div class="space-y-3">
                    <p class="text-xs font-bold text-yellow-500 uppercase">Osiągnięcia</p>
                    <!-- ACH 1 -->
                    <div id="ach-registered" class="ach-card">
                        <div class="text-2xl">🎖️</div>
                        <div><p class="font-bold text-sm">Nowy rekrut</p><p class="text-[9px]">Zarejestrowano w systemie</p></div>
                    </div>
                    <!-- ACH 2 -->
                    <div id="ach-rich" class="ach-card">
                        <div class="text-2xl">💰</div>
                        <div><p class="font-bold text-sm">Bogacz jakich mało</p><p class="text-[9px]">Zdobądź 1000 monet</p></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav>
        <button id="nav-chat" class="active-nav" onclick="showTab('chat')">💬</button>
        <button id="nav-shop" onclick="showTab('shop')">🛒</button>
        <button id="nav-profile" onclick="showTab('profile')">👤</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, onChildChanged, remove, update, increment, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCQXm-oMsOZg80gMrANDwxEbr2jWoV2I8A",
            authDomain: "mojczat-d50e5.firebaseapp.com",
            databaseURL: "https://mojczat-d50e5-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "mojczat-d50e5",
            storageBucket: "mojczat-d50e5.appspot.com",
            messagingSenderId: "278638325304",
            appId: "1:278638325304:web:d9ad946d17835af66680cd"
        };

        // --- MIEJSCE NA TWOJE UID ---
        const ADMIN_UID = "TUTAJ_WKLEJ_SWOJE_UID"; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userData = {};

        signInAnonymously(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Jeśli jesteś adminem, pokaż przycisk
                if(user.uid === ADMIN_UID) document.getElementById('adminBtn').classList.remove('hidden');
                document.getElementById('userUidDisplay').innerText = `TWOJE UID: ${user.uid}`;

                onValue(ref(db, `users/${user.uid}`), (s) => {
                    userData = s.val() || { coins: 0, registered: true };
                    
                    // Blokada konta
                    if(userData.blocked) {
                        document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%'>TWOJE KONTO ZOSTAŁO ZABLOKOWANE</h1>";
                        return;
                    }

                    document.getElementById('headerNick').innerText = userData.nick || "Anonim";
                    document.getElementById('coinCountHeader').innerText = `${(userData.coins || 0).toLocaleString()} 🪙`;
                    document.getElementById('headerAvatar').src = userData.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    if(userData.vip) document.getElementById('vipBadge').classList.remove('hidden');

                    checkAchievements();
                });
                loadMessages();
            }
        });

        // OSIĄGNIĘCIA
        function checkAchievements() {
            if(userData.registered) document.getElementById('ach-registered').classList.add('unlocked');
            if(userData.coins >= 1000) {
                document.getElementById('ach-rich').classList.add('unlocked');
                update(ref(db, `users/${auth.currentUser.uid}/achievements`), { rich: true });
            }
        }

        // CZAT
        const sendMessage = async () => {
            if(userData.muted) return alert("Jesteś wyciszony!");
            const input = document.getElementById('userInput');
            if(!input.value.trim()) return;

            const msg = {
                text: input.value.trim().replace(/</g, "&lt;"),
                nick: userData.nick || "Anonim",
                avatar: userData.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
                uid: auth.currentUser.uid,
                vip: userData.vip || false,
                userCoins: userData.coins || 0, // Zapisujemy stan monet w momencie wysłania
                time: serverTimestamp()
            };

            await push(ref(db, "messages"), msg);
            update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(10) });
            input.value = '';
        };

        function loadMessages() {
            const msgBox = document.getElementById('messages');
            onChildAdded(ref(db, "messages"), (s) => {
                const d = s.val();
                const isMe = d.uid === auth.currentUser.uid;
                const div = document.createElement('div');
                div.id = `msg-${s.key}`;
                div.className = `msg-container ${isMe ? 'me' : ''}`;
                div.innerHTML = `
                    <img src="${d.avatar}" class="w-10 h-10 rounded-full border border-gray-700 object-cover">
                    <div class="msg-bubble ${d.vip ? 'vip-bubble' : ''}">
                        <!-- MONETY NAD NICKIEM -->
                        <p class="text-[8px] text-yellow-500/80 mb-[-2px]">${d.userCoins} 🪙</p>
                        <p class="text-[10px] font-bold text-blue-400 mb-1">${d.nick}</p>
                        <p class="text-sm">${d.text}</p>
                    </div>`;
                msgBox.appendChild(div);
                msgBox.scrollTop = msgBox.scrollHeight;
            });
            onChildRemoved(ref(db, "messages"), (s) => document.getElementById(`msg-${s.key}`)?.remove());
        }

        // ADMIN FUNCTIONS
        window.toggleAdminPanel = () => {
            const p = document.getElementById('adminPanel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        };

        window.adminGiveCoins = () => {
            const uid = document.getElementById('targetUid').value;
            if(!uid) return alert("Podaj UID");
            update(ref(db, `users/${uid}`), { coins: increment(1000) });
            alert("Dodano monety!");
        };

        window.adminMute = () => {
            const uid = document.getElementById('targetUid').value;
            const refMute = ref(db, `users/${uid}/muted`);
            onValue(refMute, (s) => {
                update(ref(db, `users/${uid}`), { muted: !s.val() });
            }, {onlyOnce: true});
            alert("Zmieniono status Mute");
        };

        window.adminBlock = () => {
            const uid = document.getElementById('targetUid').value;
            const refBlock = ref(db, `users/${uid}/blocked`);
            onValue(refBlock, (s) => {
                update(ref(db, `users/${uid}`), { blocked: !s.val() });
            }, {onlyOnce: true});
            alert("Zmieniono status Block");
        };

        // SKLEP
        window.buyVIP = () => {
            if(userData.coins < 1000) return alert("Mało siana!");
            update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(-1000), vip: true });
        };

        window.buyRickroll = () => {
            if(userData.coins < 5000) return alert("Mało siana!");
            update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(-5000) });
            document.getElementById('rickFrame').src = "https://www.youtube.com/embed/QDia3e12czc?autoplay=1";
            document.getElementById('rickrollOverlay').style.display = 'block';
        };

        window.closeRickroll = () => {
            document.getElementById('rickrollOverlay').style.display = 'none';
            document.getElementById('rickFrame').src = "";
        };

        // UI
        window.showTab = (t) => {
            document.querySelectorAll('.tab-content, nav button').forEach(el => el.classList.remove('active', 'active-nav'));
            document.getElementById(t+'Tab').classList.add('active');
            document.getElementById('nav-'+t).classList.add('active-nav');
        };

        window.updateProfile = () => {
            const n = document.getElementById('nickInput').value;
            const a = document.getElementById('avatarInput').value;
            const up = {}; if(n) up.nick = n; if(a) up.avatar = a;
            update(ref(db, `users/${auth.currentUser.uid}`), up);
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('userInput').onkeypress = (e) => e.key === 'Enter' && sendMessage();
    </script>
</body>
</html>
