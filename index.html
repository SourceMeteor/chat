<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CzatSZKOLA - FIX & ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { overflow: hidden; height: 100dvh; margin: 0; background-color: #0f172a; font-family: 'Inter', sans-serif; color: white; background-size: cover; background-position: center; }
        
        /* TAPETY */
        .theme-1 { background-image: url('Assets/wall/1.png') !important; }
        .theme-2 { background-image: url('Assets/wall/2.png') !important; }
        .theme-3 { background-image: url('Assets/wall/3.png') !important; }

        /* TABS */
        .tab-content { display: none; height: calc(100dvh - 80px); width: 100%; overflow-y: auto; flex-direction: column; }
        .tab-content.active { display: flex; }
        
        #messages { flex: 1; padding: 15px; padding-bottom: 120px; display: flex; flex-direction: column; gap: 15px; }
        .msg-container { display: flex; gap: 10px; max-width: 85%; align-self: flex-start; }
        .msg-container.me { align-self: flex-end; flex-direction: row-reverse; }
        
        .msg-bubble { background: rgba(30, 41, 59, 0.9); padding: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); position: relative; min-width: 100px; }
        .me .msg-bubble { background: rgba(37, 99, 235, 0.2); border-color: rgba(37, 99, 235, 0.4); }
        .vip-bubble { border: 1px solid #eab308 !important; box-shadow: 0 0 10px rgba(234,179,8,0.2); }

        .ach-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; display: flex; align-items: center; gap: 10px; opacity: 0.3; grayscale: 1; }
        .ach-card.unlocked { opacity: 1; grayscale: 0; border-color: #eab308; background: rgba(234,179,8,0.1); }

        #adminMenu { display: none; position: fixed; top: 80px; right: 15px; width: 220px; background: #1e293b; border: 2px solid #ef4444; border-radius: 20px; padding: 15px; z-index: 1000; }
        
        #rickrollOverlay { display: none; position: fixed; inset: 0; z-index: 9999; background: black; }
        #rickrollOverlay iframe { width: 100%; height: 100%; border: none; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; display: flex; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.1); z-index: 500; }
        nav button { flex: 1; font-size: 24px; color: #64748b; }
        nav button.active-nav { color: #3b82f6; border-top: 3px solid #3b82f6; }
        
        .reaction-btn { cursor: pointer; padding: 3px 8px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 11px; }
    </style>
</head>
<body id="mainBody">

    <!-- ADMIN -->
    <div id="adminMenu">
        <h3 class="text-red-500 font-bold text-[10px] mb-2 uppercase">Admin Panel</h3>
        <input type="text" id="targetUid" placeholder="UID Gracza" class="w-full bg-black/40 p-2 rounded text-[10px] mb-2 border border-gray-700 outline-none">
        <button onclick="adm('give')" class="w-full bg-yellow-600 text-[10px] py-2 rounded mb-1 font-bold">Daj 1000 🪙</button>
        <button onclick="adm('mute')" class="w-full bg-orange-600 text-[10px] py-2 rounded mb-1 font-bold">Mute</button>
        <button onclick="adm('block')" class="w-full bg-red-600 text-[10px] py-2 rounded font-bold">Blokuj</button>
    </div>

    <!-- RICKROLL -->
    <div id="rickrollOverlay">
        <button onclick="closeRickroll()" class="absolute top-5 right-5 bg-red-600 px-6 py-2 rounded-xl font-bold">ZAMKNIJ</button>
        <iframe id="rickFrame"></iframe>
    </div>

    <!-- HEADER -->
    <header class="h-[70px] flex justify-between items-center px-4 bg-[#0f172a]/95 backdrop-blur-md border-b border-white/10 sticky top-0 z-[1000]">
        <div class="flex items-center gap-3">
            <img id="headerAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-10 h-10 rounded-full border border-blue-500">
            <div>
                <p id="headerNick" class="text-xs font-bold text-blue-400">Ładowanie...</p>
                <p class="text-yellow-500 font-bold text-[10px]"><span id="coinCountHeader">0</span> 🪙</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="crown" onclick="toggleAdmin()" class="hidden text-xl">👑</button>
            <div id="vipTag" class="hidden bg-yellow-500 text-black text-[8px] px-2 py-1 rounded font-black">VIP</div>
        </div>
    </header>

    <main class="h-full w-full">
        <!-- CZAT -->
        <section id="chatTab" class="tab-content active">
            <div id="messages"></div>
            <div class="fixed bottom-20 left-0 w-full p-3 bg-[#0f172a] border-t border-white/5">
                <div class="flex gap-2 max-w-4xl mx-auto">
                    <input type="text" id="userInput" placeholder="Napisz coś..." class="flex-1 bg-gray-800 p-3 rounded-xl outline-none border border-gray-700">
                    <button id="sendBtn" class="bg-blue-600 px-5 rounded-xl font-bold">WYŚLIJ</button>
                </div>
            </div>
        </section>

        <!-- SKLEP -->
        <section id="shopTab" class="tab-content p-5">
            <h2 class="font-bold text-blue-400 mb-4 uppercase text-sm">Sklep</h2>
            <div class="space-y-3">
                <div class="bg-gray-800 p-4 rounded-2xl flex justify-between items-center border border-red-500">
                    <p class="text-sm font-bold">Rickroll <span class="block text-[10px] text-gray-400">Na cały ekran</span></p>
                    <button onclick="buy('rick')" class="bg-red-600 px-4 py-2 rounded-lg text-xs font-bold">5000 🪙</button>
                </div>
                <div class="bg-gray-800 p-4 rounded-2xl flex justify-between items-center border border-yellow-500">
                    <p class="text-sm font-bold">VIP <span class="block text-[10px] text-gray-400">Złoty nick</span></p>
                    <button onclick="buy('vip')" class="bg-yellow-600 px-4 py-2 rounded-lg text-xs font-bold">1000 🪙</button>
                </div>
            </div>
        </section>

        <!-- PROFIL -->
        <section id="profileTab" class="tab-content p-5">
            <div class="bg-gray-800 p-5 rounded-2xl mb-6">
                <input type="text" id="nickInp" placeholder="Nick" class="w-full p-3 bg-gray-900 rounded-lg mb-2 border border-gray-700 text-sm">
                <input type="text" id="avInp" placeholder="Link do awatara" class="w-full p-3 bg-gray-900 rounded-lg mb-3 border border-gray-700 text-sm">
                <button onclick="saveProf()" class="w-full bg-blue-600 py-3 rounded-lg font-bold text-xs uppercase">Zapisz</button>
                <p id="myUid" class="text-[8px] text-gray-600 mt-4 text-center break-all select-all"></p>
            </div>
            
            <p class="text-xs font-bold text-yellow-500 mb-3 uppercase">Osiągnięcia</p>
            <div class="space-y-2">
                <div id="ach1" class="ach-card"><div class="text-xl">🎖️</div><div class="text-[10px]"><p class="font-bold">Nowy Rekrut</p><p>Dołączono do gry</p></div></div>
                <div id="ach2" class="ach-card"><div class="text-xl">💰</div><div class="text-[10px]"><p class="font-bold">Bogacz jakich mało</p><p>Zdobądź 1000 monet</p></div></div>
            </div>
        </section>
    </main>

    <nav>
        <button id="btn-chat" class="active-nav" onclick="tab('chat')">💬</button>
        <button id="btn-shop" onclick="tab('shop')">🛒</button>
        <button id="btn-profile" onclick="tab('profile')">👤</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, onChildChanged, remove, update, increment, onValue, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.app/";

        const firebaseConfig = {
            apiKey: "AIzaSyCQXm-oMsOZg80gMrANDwxEbr2jWoV2I8A",
            authDomain: "mojczat-d50e5.firebaseapp.com",
            databaseURL: "https://mojczat-d50e5-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "mojczat-d50e5",
            storageBucket: "mojczat-d50e5.appspot.com",
            messagingSenderId: "278638325304",
            appId: "1:278638325304:web:d9ad946d17835af66680cd"
        };

        const ADMIN_UID = "YWuvOvKiNdbgGoQIVThBKfF22lY2"; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userState = { coins: 0, registered: true };

        signInAnonymously(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if(user.uid === ADMIN_UID) document.getElementById('crown').classList.remove('hidden');
                document.getElementById('myUid').innerText = `TWOJE UID: ${user.uid}`;
                
                // Nasłuch danych o użytkowniku
                onValue(ref(db, `users/${user.uid}`), (s) => {
                    const data = s.val();
                    if(data) {
                        userState = data;
                        if(data.blocked) {
                            document.body.innerHTML = "<div class='h-screen flex items-center justify-center text-red-500'>ZABLOKOWANY</div>";
                            return;
                        }
                        document.getElementById('headerNick').innerText = data.nick || "Anonim";
                        document.getElementById('coinCountHeader').innerText = (data.coins || 0).toLocaleString();
                        document.getElementById('headerAvatar').src = data.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                        if(data.vip) document.getElementById('vipTag').classList.remove('hidden');
                        
                        // Osiągnięcia
                        document.getElementById('ach1').classList.add('unlocked');
                        if(data.coins >= 1000) document.getElementById('ach2').classList.add('unlocked');
                    } else {
                        // Inicjalizacja nowego użytkownika
                        update(ref(db, `users/${user.uid}`), { coins: 0, registered: true, nick: "Anonim" });
                    }
                });
                
                loadMsgs();
            }
        });

        // REAKCJE
        window.react = async (id, type) => {
            const uid = auth.currentUser.uid;
            const logRef = ref(db, `react_logs/${id}/${type}/${uid}`);
            const check = await get(logRef);
            if(!check.exists()) {
                update(ref(db, `messages/${id}/reactions`), { [type]: increment(1) });
                update(logRef, { clicked: true });
            }
        };

        const send = async () => {
            const inp = document.getElementById('userInput');
            const val = inp.value.trim();
            if(!val || userState.muted) return;

            const m = {
                text: val.substring(0,400).replace(/</g,"&lt;"),
                nick: userState.nick || "Anonim",
                avatar: userState.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
                uid: auth.currentUser.uid,
                vip: userState.vip || false,
                coinsAtTime: userState.coins || 0,
                reactions: { heart: 0, fire: 0 },
                time: serverTimestamp()
            };

            await push(ref(db, "messages"), m);
            update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(5) });
            inp.value = '';
        };

        function loadMsgs() {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            onChildAdded(ref(db, "messages"), (s) => {
                const d = s.val();
                const isMe = d.uid === auth.currentUser.uid;
                const div = document.createElement('div');
                div.id = `msg-${s.key}`;
                div.className = `msg-container ${isMe ? 'me' : ''}`;
                div.innerHTML = `
                    <img src="${d.avatar}" class="w-8 h-8 rounded-full border border-gray-700 mt-4">
                    <div class="msg-bubble ${d.vip ? 'vip-bubble' : ''}">
                        <p class="text-[7px] text-yellow-500 font-bold mb-[-3px]">${d.coinsAtTime} 🪙</p>
                        <p class="text-[9px] font-bold text-blue-400 mb-1">${d.nick}</p>
                        <p class="text-xs">${d.text}</p>
                        <div class="flex gap-2 mt-2" id="re-${s.key}">
                            <span class="reaction-btn" onclick="react('${s.key}', 'heart')">❤️ ${d.reactions?.heart || 0}</span>
                            <span class="reaction-btn" onclick="react('${s.key}', 'fire')">🔥 ${d.reactions?.fire || 0}</span>
                        </div>
                    </div>`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
            onChildChanged(ref(db, "messages"), (s) => {
                const d = s.val();
                const re = document.getElementById(`re-${s.key}`);
                if(re) re.innerHTML = `<span class="reaction-btn" onclick="react('${s.key}', 'heart')">❤️ ${d.reactions?.heart || 0}</span><span class="reaction-btn" onclick="react('${s.key}', 'fire')">🔥 ${d.reactions?.fire || 0}</span>`;
            });
        }

        // ADMIN
        window.adm = async (act) => {
            const target = document.getElementById('targetUid').value.trim();
            if(!target) return alert("Podaj UID");
            const r = ref(db, `users/${target}`);
            if(act === 'give') update(r, { coins: increment(1000) });
            if(act === 'mute') { const s = await get(ref(db, `users/${target}/muted`)); update(r, { muted: !s.val() }); }
            if(act === 'block') { const s = await get(ref(db, `users/${target}/blocked`)); update(r, { blocked: !s.val() }); }
            alert("Zrobione!");
        };

        window.toggleAdmin = () => {
            const m = document.getElementById('adminMenu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };

        window.tab = (t) => {
            document.querySelectorAll('.tab-content, nav button').forEach(e => e.classList.remove('active', 'active-nav'));
            document.getElementById(`${t}Tab`).classList.add('active');
            document.getElementById(`btn-${t}`).classList.add('active-nav');
        };

        window.buy = (item) => {
            if(item === 'rick') {
                if(userState.coins < 5000) return alert("Za mało monet!");
                update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(-5000) });
                document.getElementById('rickFrame').src = "https://www.youtube.com/embed/QDia3e12czc?autoplay=1";
                document.getElementById('rickrollOverlay').style.display = 'block';
            }
            if(item === 'vip') {
                if(userState.coins < 1000) return alert("Za mało monet!");
                update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(-1000), vip: true });
            }
        };

        window.closeRickroll = () => {
            document.getElementById('rickrollOverlay').style.display = 'none';
            document.getElementById('rickFrame').src = "";
        };

        window.saveProf = () => {
            const n = document.getElementById('nickInp').value;
            const a = document.getElementById('avInp').value;
            const up = {}; if(n) up.nick = n; if(a) up.avatar = a;
            update(ref(db, `users/${auth.currentUser.uid}`), up);
        };

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('userInput').onkeypress = (e) => e.key === 'Enter' && send();
    </script>
</body>
</html>
