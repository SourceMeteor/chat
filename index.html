<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Firebase - Backup</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; width: 100%; }
        .stats { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; border: 1px solid #333; }
        #coinCountHeader { color: #ffd700; font-weight: bold; font-size: 1.2em; }
        #chat-box { height: 350px; background: #1e1e1e; border: 1px solid #333; border-radius: 10px; overflow-y: auto; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; font-size: 0.9em; max-width: 85%; }
        .msg-admin { background: #4a3b00; border-left: 4px solid #ffd700; align-self: flex-start; }
        .msg-vip { background: #00334a; border-left: 4px solid #00a2ff; align-self: flex-start; }
        .msg-user { background: #333; align-self: flex-start; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #252525; color: white; }
        button { padding: 10px 20px; border: none; border-radius: 5px; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .shop { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .shop button { background: #28a745; margin-right: 5px; margin-top: 5px; }
        .shop button:hover { background: #218838; }
    </style>
</head>
<body>

    <div class="container">
        <div class="stats">
            💰 Twoje Monety: <span id="coinCountHeader">Ładowanie...</span>
        </div>

        <div id="chat-box"></div>

        <div class="controls">
            <input type="text" id="messageInput" placeholder="Napisz wiadomość...">
            <button id="sendBtn">Wyślij</button>
        </div>

        <div class="shop">
            <h3>🛒 Sklep</h3>
            <button onclick="buyItem('vip', 500)">Kup VIP (500 💰)</button>
            <button onclick="buyItem('extra_coins', 0)">Darmowe 50 monet (Test)</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
