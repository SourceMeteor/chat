<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Mega Chat - System Monet i Osiągnięć</title>
    <style>
        :root { --bg-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=1920'); }
        body { 
            margin: 0; padding: 0;
            background: var(--bg-image) no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; height: 100vh; color: white;
        }

        /* Ekran Logowania */
        #auth-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999;
        }
        .auth-box { background: #222; padding: 30px; border-radius: 15px; border: 1px solid gold; text-align: center; }
        .auth-box input { display: block; width: 250px; margin: 10px auto; padding: 10px; border-radius: 5px; border: none; }

        /* Interfejs Czatu */
        .top-bar { background: rgba(0,0,0,0.7); padding: 15px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px); }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; position: relative; font-size: 14px; line-height: 1.4; }
        .msg-user { background: rgba(255,255,255,0.2); align-self: flex-start; }
        .msg-vip { background: rgba(0, 162, 255, 0.3); border: 1px solid #00a2ff; align-self: flex-start; }
        .msg-admin { background: rgba(255, 215, 0, 0.3); border: 1px solid gold; align-self: flex-start; }
        
        .input-area { background: rgba(0,0,0,0.8); padding: 20px; display: flex; gap: 10px; }
        input#messageInput { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }

        .badge { background: gold; color: black; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-right: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- EKRAN AUTORYZACJI -->
    <div id="auth-screen">
        <div class="auth-box">
            <h2>Witaj na Czacie</h2>
            <input type="email" id="email" placeholder="Twój Email">
            <input type="password" id="password" placeholder="Hasło">
            <button onclick="handleAuth('login')">Zaloguj</button>
            <button onclick="handleAuth('register')">Zarejestruj</button>
        </div>
    </div>

    <!-- PASEK GÓRNY -->
    <div class="top-bar hidden" id="ui-top">
        <div>💰 Monety: <span id="coinCountHeader">0</span></div>
        <div id="achievements-list"></div>
        <button onclick="openShop()" style="background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">SKLEP</button>
    </div>

    <!-- OKNO CZATU -->
    <div id="chat-container" class="hidden"></div>

    <!-- WPISYWANIE -->
    <div class="input-area hidden" id="ui-bottom">
        <input type="text" id="messageInput" placeholder="Napisz wiadomość...">
        <button id="sendBtn" style="border-radius: 50%; width: 45px; height: 45px; cursor: pointer;">⚡</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
