<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CzatSZKOLA - Wallpapers Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            overflow: hidden; height: 100dvh; margin: 0; font-family: sans-serif; 
            background-color: #0f172a; background-size: cover; background-position: center; transition: 0.5s;
        }
        .tab-content { display: none; height: calc(100dvh - 160px); width: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); }
        
        /* Obniżony pasek o 50px */
        .input-area { position: fixed; bottom: 30px; left: 0; width: 100%; z-index: 450; }
        
        /* Twoje Tapety z assets/wall/ */
        .theme-1 { background-image: url('assets/wall/1.png'); }
        .theme-2 { background-image: url('assets/wall/2.png'); }
        .theme-3 { background-image: url('assets/wall/3.png'); }
        .theme-0 { background-color: #0f172a; background-image: none; }

        #messages { flex: 1; padding: 20px; padding-bottom: 130px; display: flex; flex-direction: column; gap: 10px; }
        nav button { flex: 1; height: 100%; font-size: 1.5rem; transition: 0.2s; z-index: 1000; }
        .premium-border { border: 2px solid #a855f7 !important; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body id="mainBody" class="theme-0 text-white">

    <div id="loginScreen" class="fixed inset-0 z-[2000] bg-gray-900 flex items-center justify-center p-6" style="display: none;">
        <div class="w-full max-w-sm space-y-4 bg-gray-800 p-8 rounded-3xl shadow-2xl">
            <h2 class="text-3xl font-black text-blue-500 text-center italic uppercase tracking-tighter">CzatSZKOLA</h2>
            <input type="email" id="emailInput" placeholder="E-mail" class="w-full p-4 bg-gray-700 rounded-2xl outline-none">
            <input type="password" id="passwordInput" placeholder="Hasło" class="w-full p-4 bg-gray-700 rounded-2xl outline-none">
            <button id="loginBtn" class="w-full bg-blue-600 py-4 rounded-2xl font-bold uppercase">Zaloguj</button>
            <button id="registerBtn" class="w-full bg-gray-700 py-3 rounded-xl text-xs uppercase">Rejestracja</button>
        </div>
    </div>

    <header class="h-[70px] border-b border-gray-800 flex justify-between items-center px-4 glass sticky top-0 z-[500]">
        <div class="flex items-center gap-3">
            <img id="headerAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-10 h-10 rounded-full border-2 border-blue-500 object-cover">
            <div>
                <h1 id="headerNick" class="text-sm font-bold text-blue-400">Ładowanie...</h1>
                <div class="flex gap-2">
                    <span id="coinCount" class="text-yellow-400 font-bold text-[10px]">0 🪙</span>
                    <span id="premiumBadge" class="hidden text-[8px] bg-purple-600 px-1 rounded font-bold uppercase">Premium</span>
                </div>
            </div>
        </div>
    </header>

    <main class="relative h-full w-full">
        <!-- CZAT -->
        <section id="chatTab" class="tab-content active">
            <div id="messages"></div>
            <div class="input-area glass p-4">
                <div class="flex gap-2 max-w-5xl mx-auto">
                    <input type="text" id="userInput" placeholder="Napisz wiadomość..." class="flex-1 bg-gray-800/80 p-4 rounded-2xl outline-none text-sm border border-gray-700">
                    <button id="sendBtn" class="bg-blue-600 px-6 py-4 rounded-2xl font-bold">></button>
                </div>
            </div>
        </section>

        <!-- SKLEP -->
        <section id="settingsTab" class="tab-content p-6">
            <h3 class="text-xl font-black text-blue-400 mb-6 uppercase italic">Sklep</h3>
            <div class="space-y-4">
                <div class="bg-gray-800/80 p-4 rounded-2xl border-2 border-purple-500 flex justify-between items-center">
                    <div>
                        <p class="font-bold">💎 Ranga Premium</p>
                        <p class="text-[10px] text-gray-400">Specjalna ramka i ranga</p>
                    </div>
                    <button onclick="buyItem('premium', 10000)" class="bg-purple-600 px-4 py-2 rounded-xl text-xs font-bold">10k 🪙</button>
                </div>
            </div>
        </section>

        <!-- PROFIL -->
        <section id="profileTab" class="tab-content p-6">
            <div class="space-y-6 max-w-sm mx-auto">
                <h3 class="text-xl font-black text-blue-400 uppercase">Twój Profil</h3>
                <div class="space-y-3">
                    <input type="text" id="nickInput" placeholder="Zmień Nick" class="w-full p-4 bg-gray-800 rounded-2xl outline-none border border-gray-700">
                    <input type="text" id="avatarInput" placeholder="Link do Awatara" class="w-full p-4 bg-gray-800 rounded-2xl outline-none border border-gray-700">
                    <button onclick="saveProfile()" class="w-full bg-green-600 py-4 rounded-2xl font-bold uppercase text-sm">Zapisz Zmiany</button>
                </div>
                
                <div class="pt-6 border-t border-gray-700">
                    <p class="text-[10px] font-bold text-gray-500 mb-3 uppercase tracking-widest text-center">Wybierz Tapetę</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setTheme(0)" class="p-3 bg-slate-800 rounded-xl text-[10px] hover:bg-slate-700 transition-colors">Domyślna</button>
                        <button onclick="setTheme(1)" class="p-3 bg-blue-900/50 border border-blue-500 rounded-xl text-[10px] hover:bg-blue-800 transition-colors">Tapeta 1</button>
                        <button onclick="setTheme(2)" class="p-3 bg-purple-900/50 border border-purple-500 rounded-xl text-[10px] hover:bg-purple-800 transition-colors">Tapeta 2</button>
                        <button onclick="setTheme(3)" class="p-3 bg-green-900/50 border border-green-500 rounded-xl text-[10px] hover:bg-green-800 transition-colors">Tapeta 3</button>
                    </div>
                </div>
                
                <button id="logoutBtn" class="w-full mt-10 text-red-500 font-bold bg-red-900/10 py-4 rounded-2xl uppercase text-xs border border-red-900/20">Wyloguj Się</button>
            </div>
        </section>
    </main>

    <!-- MENU DOLNE -->
    <nav class="fixed bottom-0 left-0 w-full h-[80px] glass flex justify-around items-center z-[1000] border-t border-gray-800">
        <button onclick="showTab('chat')">💬</button>
        <button onclick="showTab('settings')">🛒</button>
        <button onclick="showTab('profile')">⚙️</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onValue, serverTimestamp, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQXm-oMsOZg80gMrANDwxEbr2jWoV2I8A",
            authDomain: "mojczat-d50e5.firebaseapp.com",
            databaseURL: "https://mojczat-d50e5-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "mojczat-d50e5",
            storageBucket: "mojczat-d50e5.appspot.com",
            messagingSenderId: "278638325304",
            appId: "1:278638325304:web:d9ad946d17835af66680cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userData = {};

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                onValue(ref(db, `users/${user.uid}`), (s) => {
                    const d = s.val() || {};
                    userData = d;
                    document.getElementById('coinCount').innerText = `${(d.coins || 0).toLocaleString()} 🪙`;
                    document.getElementById('headerNick').innerText = d.nick || user.email;
                    document.getElementById('headerAvatar').src = d.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    if(d.premium) document.getElementById('premiumBadge').classList.remove('hidden');
                    
                    if(!document.getElementById('nickInput').value) document.getElementById('nickInput').value = d.nick || '';
                    if(!document.getElementById('avatarInput').value) document.getElementById('avatarInput').value = d.avatar || '';
                });
                loadMessages();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
            }
        });

        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
        };

        window.saveProfile = () => {
            update(ref(db, `users/${auth.currentUser.uid}`), {
                nick: document.getElementById('nickInput').value,
                avatar: document.getElementById('avatarInput').value
            }).then(() => alert("Profil zaktualizowany!"));
        };

        window.setTheme = (n) => {
            document.getElementById('mainBody').className = `text-white theme-${n}`;
            localStorage.setItem('user_theme', n);
        };

        const sendMessage = async () => {
            const input = document.getElementById('userInput');
            if(!input.value.trim()) return;
            const currentNick = userData.nick || auth.currentUser.email;
            await push(ref(db, "messages"), {
                text: input.value,
                nick: currentNick,
                avatar: userData.avatar || '',
                isPremium: userData.premium || false,
                time: serverTimestamp()
            });
            await update(ref(db, `users/${auth.currentUser.uid}`), { coins: increment(5) });
            input.value = '';
        };

        function loadMessages() {
            const mBox = document.getElementById('messages');
            mBox.innerHTML = '';
            onChildAdded(ref(db, "messages"), (s) => {
                const d = s.val();
                const isMe = d.nick === (userData.nick || auth.currentUser.email);
                const div = document.createElement('div');
                div.className = `flex gap-2 mb-2 ${isMe ? 'flex-row-reverse' : ''}`;
                div.innerHTML = `
                    <img src="${d.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="w-8 h-8 rounded-full border border-gray-600 object-cover">
                    <div class="p-3 rounded-2xl max-w-[75%] bg-gray-800/90 ${d.isPremium ? 'premium-border' : ''}">
                        <p class="text-[9px] font-bold text-blue-400 mb-1">${d.nick}</p>
                        <p class="text-sm">${d.text}</p>
                    </div>`;
                mBox.appendChild(div);
                mBox.scrollTop = mBox.scrollHeight;
            });
        }

        window.buyItem = async (type, price) => {
            if((userData.coins || 0) < price) return alert("Brak monet!");
            const up = {};
            up[`users/${auth.currentUser.uid}/coins`] = increment(-price);
            if(type === 'premium') up[`users/${auth.currentUser.uid}/premium`] = true;
            await update(ref(db), up);
            alert("Zakup udany!");
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
        document.getElementById('registerBtn').onclick = () => createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

        const saved = localStorage.getItem('user_theme');
        if(saved) setTheme(saved);
    </script>
</body>
</html>
