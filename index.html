<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            overflow: hidden; height: 100dvh; margin: 0; font-family: sans-serif; 
            background-color: #0f172a; background-size: cover; background-position: center; transition: 0.5s;
        }
        .tab-content { display: none; height: calc(100dvh - 80px); width: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); }
        
        /* Pasek do pisania obniżony o 10px (z 90px na 80px) */
        .input-area { 
            position: fixed; 
            bottom: 80px; 
            left: 0; 
            width: 100%; 
            padding: 12px;
        }
        
        .theme-1 { background-image: url('Assets/wall/1.png'); }
        .theme-2 { background-image: url('Assets/wall/2.png'); }
        .theme-3 { background-image: url('Assets/wall/3.png'); }
        .theme-0 { background-color: #0f172a; }

        #messages { flex: 1; padding: 20px; padding-bottom: 180px; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { position: relative; transition: 0.3s; }
        .delete-btn { color: #ff4444; font-size: 10px; cursor: pointer; margin-left: 10px; display: none; }
        .admin-view .delete-btn { display: inline; }
        
        .reaction-bar { display: flex; gap: 5px; margin-top: 5px; font-size: 14px; }
        .reaction { cursor: pointer; padding: 2px 6px; background: rgba(255,255,255,0.1); rounded: 8px; transition: 0.2s; }
        .reaction:hover { background: rgba(255,255,255,0.2); }

        nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; }
        nav button { flex: 1; height: 100%; font-size: 1.8rem; }
    </style>
</head>
<body id="mainBody" class="theme-0 text-white">

    <header class="h-[70px] border-b border-gray-800 flex justify-between items-center px-4 glass sticky top-0">
        <div class="flex items-center gap-3">
            <div id="statusDot" class="w-3 h-3 bg-green-500 rounded-full"></div>
            <h1 id="headerNick" class="text-sm font-bold text-blue-400">Czatownik</h1>
        </div>
        <span id="coinCount" class="text-yellow-400 font-bold text-[12px]">0 🪙</span>
    </header>

    <main class="relative h-full w-full">
        <section id="chatTab" class="tab-content active">
            <div id="messages"></div>
            <div class="input-area glass">
                <div class="flex gap-2 max-w-5xl mx-auto">
                    <input type="text" id="userInput" placeholder="Napisz..." class="flex-1 bg-gray-800 p-4 rounded-2xl outline-none border border-gray-700">
                    <button id="sendBtn" class="bg-blue-600 px-6 py-4 rounded-2xl font-bold">></button>
                </div>
            </div>
        </section>

        <section id="profileTab" class="tab-content p-6">
            <div class="max-w-xs mx-auto space-y-6">
                <button onclick="setTheme(0)" class="w-full p-4 bg-slate-800 rounded-2xl">Domyślne</button>
                <button onclick="setTheme(1)" class="w-full p-4 bg-blue-900/40 rounded-2xl border border-blue-500">Tapeta 1</button>
                <button onclick="setTheme(2)" class="w-full p-4 bg-purple-900/40 rounded-2xl border border-purple-500">Tapeta 2</button>
                <button onclick="setTheme(3)" class="w-full p-4 bg-green-900/40 rounded-2xl border border-green-500">Tapeta 3</button>
            </div>
        </section>
    </main>

    <nav class="glass flex justify-around items-center border-t border-gray-800">
        <button onclick="showTab('chat')">💬</button>
        <button onclick="showTab('profile')">⚙️</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove, update, increment, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQXm-oMsOZg80gMrANDwxEbr2jWoV2I8A",
            authDomain: "mojczat-d50e5.firebaseapp.com",
            databaseURL: "https://mojczat-d50e5-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "mojczat-d50e5",
            storageBucket: "mojczat-d50e5.appspot.com",
            messagingSenderId: "278638325304",
            appId: "1:278638325304:web:d9ad946d17835af66680cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // LISTA ZAKAZANYCH SŁÓW
        const badWords = ["brzydkieslowo1", "brzydkieslowo2", "kurcze", "dupa"]; 

        let userData = {};
        const ADMIN_UID = "TWOJE_UID_Z_FIREBASE"; // Wpisz tu swoje UID, żebyś mógł usuwać

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (user.uid === ADMIN_UID) document.body.classList.add('admin-view');
                onValue(ref(db, `users/${user.uid}`), (s) => {
                    userData = s.val() || {};
                    document.getElementById('coinCount').innerText = `${(userData.coins || 0).toLocaleString()} 🪙`;
                });
                loadMessages();
            }
        });

        const filterText = (text) => {
            let filtered = text;
            badWords.forEach(word => {
                const reg = new RegExp(word, "gi");
                filtered = filtered.replace(reg, "***");
            });
            return filtered;
        };

        const sendMessage = async () => {
            const input = document.getElementById('userInput');
            let text = input.value.trim();
            if(!text) return;

            text = filterText(text); // Blokada słów

            await push(ref(db, "messages"), {
                text: text,
                nick: userData.nick || auth.currentUser.email,
                uid: auth.currentUser.uid,
                reactions: { ❤️: 0, 😂: 0, 🔥: 0 },
                time: serverTimestamp()
            });
            input.value = '';
        };

        window.deleteMsg = (id) => {
            if(confirm("Usunąć tę wiadomość?")) remove(ref(db, `messages/${id}`));
        };

        window.addReaction = (id, type) => {
            update(ref(db, `messages/${id}/reactions`), { [type]: increment(1) });
        };

        function loadMessages() {
            const mBox = document.getElementById('messages');
            onChildAdded(ref(db, "messages"), (s) => {
                const d = s.val();
                const id = s.key;
                const div = document.createElement('div');
                div.id = `msg-${id}`;
                div.className = "msg-bubble p-4 rounded-2xl bg-gray-800/90 mb-2 max-w-[85%]";
                
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <p class="text-[10px] font-bold text-blue-400">${d.nick}</p>
                        ${(auth.currentUser.uid === d.uid || auth.currentUser.uid === ADMIN_UID) ? `<span class="delete-btn" onclick="deleteMsg('${id}')">Usuń</span>` : ''}
                    </div>
                    <p class="text-sm mt-1">${d.text}</p>
                    <div class="reaction-bar">
                        <span class="reaction" onclick="addReaction('${id}', '❤️')">❤️ ${d.reactions?.❤️ || 0}</span>
                        <span class="reaction" onclick="addReaction('${id}', '😂')">😂 ${d.reactions?.😂 || 0}</span>
                        <span class="reaction" onclick="addReaction('${id}', '🔥')">🔥 ${d.reactions?.🔥 || 0}</span>
                    </div>
                `;
                mBox.appendChild(div);
                mBox.scrollTop = mBox.scrollHeight;
            });

            onChildRemoved(ref(db, "messages"), (s) => {
                document.getElementById(`msg-${s.key}`)?.remove();
            });
        }

        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
        };

        window.setTheme = (n) => {
            document.getElementById('mainBody').className = `text-white theme-${n}`;
            localStorage.setItem('user_theme', n);
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        const saved = localStorage.getItem('user_theme');
        if(saved) setTheme(saved);
    </script>
</body>
</html>
