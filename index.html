<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CzatSZKOLA - Profile & Fonts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Import czcionek z Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Merriweather&family=Orbitron:wght@400;700&display=swap');

        body { 
            overflow: hidden; height: 100dvh; margin: 0; 
            background-color: #0f172a; background-size: cover; background-position: center; transition: 0.5s;
        }
        
        /* Klasy czcionek */
        .font-modern { font-family: 'Inter', sans-serif; }
        .font-classic { font-family: 'Merriweather', serif; }
        .font-gaming { font-family: 'Orbitron', sans-serif; }

        .tab-content { display: none; height: calc(100dvh - 80px); width: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); }
        
        .input-area { position: fixed; bottom: 80px; left: 0; width: 100%; padding: 12px; }
        
        .theme-1 { background-image: url('Assets/wall/1.png'); }
        .theme-2 { background-image: url('Assets/wall/2.png'); }
        .theme-3 { background-image: url('Assets/wall/3.png'); }
        .theme-0 { background-color: #0f172a; }

        #messages { flex: 1; padding: 20px; padding-bottom: 180px; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { border-radius: 18px; position: relative; }
        
        .reaction-bar { display: flex; gap: 5px; margin-top: 8px; }
        .reaction { cursor: pointer; padding: 2px 8px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); }

        nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; }
        nav button { flex: 1; height: 100%; font-size: 1.8rem; outline: none; }
    </style>
</head>
<body id="mainBody" class="theme-0 text-white font-modern">

    <header class="h-[70px] border-b border-gray-800 flex justify-between items-center px-4 glass sticky top-0">
        <div class="flex items-center gap-3">
            <img id="headerAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-10 h-10 rounded-full border-2 border-blue-500 object-cover">
            <div>
                <h1 id="headerNick" class="text-sm font-bold text-blue-400">Ładowanie...</h1>
                <span id="coinCount" class="text-yellow-400 font-bold text-[10px]">0 🪙</span>
            </div>
        </div>
    </header>

    <main class="relative h-full w-full">
        <!-- CZAT -->
        <section id="chatTab" class="tab-content active">
            <div id="messages"></div>
            <div class="input-area glass">
                <div class="flex gap-2 max-w-5xl mx-auto">
                    <input type="text" id="userInput" placeholder="Napisz coś..." class="flex-1 bg-gray-800 p-4 rounded-2xl outline-none border border-gray-700">
                    <button id="sendBtn" class="bg-blue-600 px-6 py-4 rounded-2xl font-bold">></button>
                </div>
            </div>
        </section>

        <!-- PROFIL I USTAWIENIA -->
        <section id="profileTab" class="tab-content p-6 space-y-8">
            <div class="max-w-sm mx-auto space-y-6">
                <h3 class="text-xl font-black text-blue-400 uppercase text-center italic">Twój Profil</h3>
                
                <!-- Zmiana danych -->
                <div class="space-y-3">
                    <input type="text" id="nickInput" placeholder="Nowy Nick" class="w-full p-4 bg-gray-800 rounded-2xl outline-none border border-gray-700">
                    <input type="text" id="avatarInput" placeholder="URL do Awatara (PNG/JPG)" class="w-full p-4 bg-gray-800 rounded-2xl outline-none border border-gray-700">
                    <button onclick="updateProfile()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold shadow-lg shadow-blue-900/20">ZAPISZ ZMIANY</button>
                </div>

                <!-- Wybór czcionki -->
                <div class="space-y-3">
                    <p class="text-[10px] text-gray-500 uppercase font-bold text-center">Styl Czcionki</p>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setFont('font-modern')" class="p-2 bg-gray-800 rounded-xl text-[10px] border border-gray-600">MODERN</button>
                        <button onclick="setFont('font-classic')" class="p-2 bg-gray-800 rounded-xl text-[10px] border border-gray-600">CLASSIC</button>
                        <button onclick="setFont('font-gaming')" class="p-2 bg-gray-800 rounded-xl text-[10px] border border-gray-600">GAMER</button>
                    </div>
                </div>

                <!-- Tapety -->
                <div class="space-y-3">
                    <p class="text-[10px] text-gray-500 uppercase font-bold text-center">Tapeta (Assets/wall/)</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setTheme(0)" class="p-3 bg-slate-800 rounded-xl text-[10px]">DOMYŚLNE</button>
                        <button onclick="setTheme(1)" class="p-3 bg-blue-900/40 border border-blue-500 rounded-xl text-[10px]">1.PNG</button>
                        <button onclick="setTheme(2)" class="p-3 bg-purple-900/40 border border-purple-500 rounded-xl text-[10px]">2.PNG</button>
                        <button onclick="setTheme(3)" class="p-3 bg-green-900/40 border border-green-500 rounded-xl text-[10px]">3.PNG</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="glass flex justify-around items-center border-t border-gray-800">
        <button onclick="showTab('chat')">💬</button>
        <button onclick="showTab('profile')">⚙️</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove, update, increment, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQXm-oMsOZg80gMrANDwxEbr2jWoV2I8A",
            authDomain: "mojczat-d50e5.firebaseapp.com",
            databaseURL: "https://mojczat-d50e5-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "mojczat-d50e5",
            storageBucket: "mojczat-d50e5.appspot.com",
            messagingSenderId: "278638325304",
            appId: "1:278638325304:web:d9ad946d17835af66680cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const badWords = ["dupa", "kurcze", "zlosliwy"];
        let userData = {};

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, `users/${user.uid}`), (s) => {
                    userData = s.val() || {};
                    document.getElementById('coinCount').innerText = `${(userData.coins || 0).toLocaleString()} 🪙`;
                    document.getElementById('headerNick').innerText = userData.nick || user.email;
                    document.getElementById('headerAvatar').src = userData.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                });
                loadMessages();
            }
        });

        // AKTUALIZACJA PROFILU
        window.updateProfile = () => {
            const newNick = document.getElementById('nickInput').value.trim();
            const newAvatar = document.getElementById('avatarInput').value.trim();
            const updates = {};
            if(newNick) updates.nick = newNick;
            if(newAvatar) updates.avatar = newAvatar;
            
            update(ref(db, `users/${auth.currentUser.uid}`), updates).then(() => {
                alert("Profil zaktualizowany!");
            });
        };

        // ZMIANA CZCIONKI
        window.setFont = (fontClass) => {
            document.body.classList.remove('font-modern', 'font-classic', 'font-gaming');
            document.body.classList.add(fontClass);
            localStorage.setItem('user_font', fontClass);
        };

        const filterText = (text) => {
            let filtered = text;
            badWords.forEach(word => {
                const reg = new RegExp(word, "gi");
                filtered = filtered.replace(reg, "***");
            });
            return filtered;
        };

        const sendMessage = async () => {
            const input = document.getElementById('userInput');
            let text = input.value.trim();
            if(!text) return;

            text = filterText(text);

            await push(ref(db, "messages"), {
                text: text,
                nick: userData.nick || auth.currentUser.email,
                avatar: userData.avatar || '',
                uid: auth.currentUser.uid,
                reactions: { ❤️: 0, 😂: 0, 🔥: 0 },
                time: serverTimestamp()
            });
            input.value = '';
        };

        window.addReaction = (id, type) => {
            update(ref(db, `messages/${id}/reactions`), { [type]: increment(1) });
        };

        function loadMessages() {
            const mBox = document.getElementById('messages');
            onChildAdded(ref(db, "messages"), (s) => {
                const d = s.val();
                const id = s.key;
                const div = document.createElement('div');
                div.id = `msg-${id}`;
                div.className = "flex gap-2 mb-4";
                div.innerHTML = `
                    <img src="${d.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="w-8 h-8 rounded-full object-cover">
                    <div class="msg-bubble p-3 bg-gray-800/90 max-w-[80%] border border-gray-700">
                        <p class="text-[9px] font-bold text-blue-400 mb-1">${d.nick}</p>
                        <p class="text-sm">${d.text}</p>
                        <div class="reaction-bar">
                            <span class="reaction" onclick="addReaction('${id}', '❤️')">❤️ ${d.reactions?.❤️ || 0}</span>
                            <span class="reaction" onclick="addReaction('${id}', '😂')">😂 ${d.reactions?.😂 || 0}</span>
                            <span class="reaction" onclick="addReaction('${id}', '🔥')">🔥 ${d.reactions?.🔥 || 0}</span>
                        </div>
                    </div>
                `;
                mBox.appendChild(div);
                mBox.scrollTop = mBox.scrollHeight;
            });
        }

        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
        };

        window.setTheme = (n) => {
            document.getElementById('mainBody').className = `${document.body.classList.value.split(' ')[0]} text-white theme-${n}`;
            localStorage.setItem('user_theme', n);
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        
        // Wczytywanie zapisanych ustawień
        const savedTheme = localStorage.getItem('user_theme');
        if(savedTheme) setTheme(savedTheme);
        const savedFont = localStorage.getItem('user_font');
        if(savedFont) setFont(savedFont);
    </script>
</body>
</html>
